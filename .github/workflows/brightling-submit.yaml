name: Submit New Team via Discord

on:
  workflow_dispatch:
    inputs:
      team_handle:
        description: '2-4 alphanumeric characters (e.g. SRI5)'
        required: true
      team_fqdn:
        description: 'Full team name'
        required: true
      team_description:
        description: 'Team description (optional)'
        required: false
      members_csv_lines:
        description: 'CSV lines without header (discord_name,vrc_name,runstyle,role)'
        required: true
      submission_secret:
        description: 'Secret token (do not share)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify secret & validate submission
        env:
          TEAM_SUBMISSION_SECRET: ${{ secrets.TEAM_SUBMISSION_SECRET }}
          TEAM_HANDLE: ${{ inputs.team_handle }}
          TEAM_FQDN: ${{ inputs.team_fqdn }}
          TEAM_DESCRIPTION: ${{ inputs.team_description }}
          TEAM_MEMBERS_CSV_LINES: ${{ inputs.members_csv_lines }}
          TEAM_INPUT_SECRET: ${{ inputs.submission_secret }}
        run: |
          python3 .github/scripts/validate-workflow-input.py \
            "$TEAM_HANDLE" \
            "$TEAM_FQDN" \
            "$TEAM_DESCRIPTION" \
            "$TEAM_MEMBERS_CSV_LINES" \
            "$TEAM_INPUT_SECRET"

      - name: Generate team files
        env:
          TEAM_HANDLE: ${{ inputs.team_handle }}
          TEAM_FQDN: ${{ inputs.team_fqdn }}
          TEAM_DESCRIPTION: ${{ inputs.team_description }}
          TEAM_MEMBERS_CSV_LINES: ${{ inputs.members_csv_lines }}
        run: |
          python3 .github/scripts/create-team.py \
            "$TEAM_HANDLE" \
            "$TEAM_FQDN" \
            "$TEAM_DESCRIPTION" \
            "$TEAM_MEMBERS_CSV_LINES"

      - name: Create branch and commit
        env:
          TEAM_HANDLE: ${{ inputs.team_handle }}
        run: |
          TEAM_BRANCH="team-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "TEAM_BRANCH=$TEAM_BRANCH" >> "$GITHUB_ENV"

          git config user.name "Mejiro Bright[bot]"
          git config user.email "276016887+brightling-ci@users.noreply.github.com"

          git checkout -b "$TEAM_BRANCH"
          git add "teams/active/$TEAM_HANDLE/members.csv" "teams/active/$TEAM_HANDLE/metadata.yaml"
          git commit -m "Add team submission: $TEAM_HANDLE"
          git push --set-upstream origin "$TEAM_BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          TEAM_HANDLE: ${{ inputs.team_handle }}
          TEAM_FQDN: ${{ inputs.team_fqdn }}
          TEAM_DESCRIPTION: ${{ inputs.team_description }}
          TEAM_MEMBERS_CSV_LINES: ${{ inputs.members_csv_lines }}
        with:
          github-token: ${{ secrets.BRIGHTLING_GITHUB_TOKEN }}
          script: |
            const body = [
              'Submitted via Discord.',
              '',
              `**Handle:** ${process.env.TEAM_HANDLE}`,
              `**Full name:** ${process.env.TEAM_FQDN}`,
              '**Description:**',
              process.env.TEAM_DESCRIPTION || 'None provided',
              '',
              '**Members preview:**',
              process.env.TEAM_MEMBERS_CSV_LINES,
            ].join('\n');

            const response = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New team → ${process.env.TEAM_HANDLE} (${process.env.TEAM_FQDN})`,
              head: process.env.TEAM_BRANCH,
              base: context.payload.repository.default_branch,
              body,
            });

            core.info(`Created pull request #${response.data.number}: ${response.data.html_url}`);