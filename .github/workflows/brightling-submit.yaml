name: Submit New Team via Discord

on:
  workflow_dispatch:
    inputs:
      team_handle:
        description: '2-4 alphanumeric characters (e.g. SRI5)'
        required: true
      team_fqdn:
        description: 'Full team name'
        required: true
      team_description:
        description: 'Team description (optional)'
        required: false
      members_csv_lines:
        description: 'CSV lines without header (discord_name,vrc_name,runstyle,role)'
        required: true
      submission_secret:
        description: 'Secret token (do not share)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify secret & validate submission
        env:
          TEAM_SUBMISSION_SECRET: ${{ secrets.TEAM_SUBMISSION_SECRET }}
          TEAM_HANDLE: ${{ inputs.team_handle }}
          TEAM_FQDN: ${{ inputs.team_fqdn }}
          TEAM_DESCRIPTION: ${{ inputs.team_description }}
          TEAM_MEMBERS_CSV_LINES: ${{ inputs.members_csv_lines }}
          TEAM_INPUT_SECRET: ${{ inputs.submission_secret }}
        run: |
          python3 .github/scripts/validate-workflow-input.py \
            "$TEAM_HANDLE" \
            "$TEAM_FQDN" \
            "$TEAM_DESCRIPTION" \
            "$TEAM_MEMBERS_CSV_LINES" \
            "$TEAM_INPUT_SECRET"

      - name: Generate team files
        env:
          TEAM_HANDLE: ${{ inputs.team_handle }}
          TEAM_FQDN: ${{ inputs.team_fqdn }}
          TEAM_DESCRIPTION: ${{ inputs.team_description }}
          TEAM_MEMBERS_CSV_LINES: ${{ inputs.members_csv_lines }}
        run: |
          python3 .github/scripts/create-team.py \
            "$TEAM_HANDLE" \
            "$TEAM_FQDN" \
            "$TEAM_DESCRIPTION" \
            "$TEAM_MEMBERS_CSV_LINES"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Add team submission: ${{ inputs.team_handle }}"
          branch: team-${{ inputs.team_handle }}-${{ github.run_id }}
          title: "New team → ${{ inputs.team_handle }} (${{ inputs.team_fqdn }})"
          body: |
            Submitted via Discord.

            **Handle:** ${{ inputs.team_handle }}
            **Full name:** ${{ inputs.team_fqdn }}
            **Description:**  
            ${{ inputs.team_description || 'None provided' }}

            **Members preview:**
            ${{ inputs.members_csv_lines }}